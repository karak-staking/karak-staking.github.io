<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Karak Staking - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Karak Staking DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://karak-staking.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root {
  --bg: #F7F7FA;
  --surface: #FFFFFF;
  --panel: #FAFAFC;
  --ink: #17151F;
  --muted: #686577;
  --soft: #9893A6;
  --line: rgba(23, 21, 31, 0.10);
  --line-strong: rgba(23, 21, 31, 0.16);
  --accent: #5B4BD6;
  --accent-soft: rgba(91, 75, 214, 0.12);
  --shadow: 0 28px 70px -34px rgba(23, 21, 31, 0.35);
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  min-height: 100dvh;
  overflow: hidden;
  color: var(--ink);
  background:
    radial-gradient(70% 46% at 50% -18%, rgba(91, 75, 214, 0.13), transparent 64%),
    linear-gradient(180deg, #FBFBFD 0%, var(--bg) 100%);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

h1,
p {
  margin: 0;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px clamp(16px, 4vw, 42px);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  font-size: 1.05rem;
  font-weight: 760;
  letter-spacing: 0;
  white-space: nowrap;
}

.brand img {
  flex: none;
  border-radius: 9px;
  box-shadow: 0 8px 18px -12px rgba(23, 21, 31, 0.55);
}

.nav {
  display: flex;
  align-items: center;
  gap: 25px;
  margin-left: 12px;
}

.nav a {
  color: var(--muted);
  font-size: 0.93rem;
  font-weight: 560;
  white-space: nowrap;
  transition: color 160ms ease;
}

.nav a:hover {
  color: var(--ink);
}

.spacer {
  flex: 1;
}

.ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 8px 17px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.58);
  color: var(--ink);
  font-size: 0.9rem;
  font-weight: 720;
  white-space: nowrap;
  box-shadow: 0 12px 28px -24px rgba(23, 21, 31, 0.4);
  transition: border-color 160ms ease, color 160ms ease, transform 120ms ease;
}

.ghost:hover {
  border-color: rgba(91, 75, 214, 0.36);
  color: var(--accent);
  transform: translateY(-1px);
}

.stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 14px clamp(16px, 4vw, 42px) 8px;
  text-align: center;
}

h1 {
  max-width: 10ch;
  font-size: clamp(2.72rem, 7vw, 4.55rem);
  font-weight: 800;
  line-height: 1.03;
  letter-spacing: 0;
}

.sub {
  width: min(100%, 650px);
  margin-top: 15px;
  color: var(--muted);
  font-size: clamp(1rem, 1.8vw, 1.17rem);
}

.sub strong {
  color: var(--ink);
  font-weight: 760;
  box-shadow: inset 0 -0.48em 0 var(--accent-soft);
}

.card {
  width: min(572px, 100%);
  margin-top: 31px;
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 22px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.9)),
    var(--surface);
  box-shadow: var(--shadow);
}

.route {
  display: flex;
  align-items: stretch;
  gap: 12px;
}

.leg {
  flex: 1;
  min-width: 0;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: 15px;
  background: var(--panel);
  text-align: left;
}

.label {
  display: block;
  color: var(--soft);
  font-size: 0.71rem;
  font-weight: 760;
  letter-spacing: 0.08em;
  line-height: 1;
  text-transform: uppercase;
}

.chip {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  margin-top: 10px;
  color: var(--ink);
  font-size: 1.12rem;
  font-weight: 800;
  line-height: 1.1;
}

.token {
  width: 28px;
  height: 28px;
  flex: none;
  border-radius: 50%;
}

.switch {
  width: 42px;
  height: 42px;
  flex: none;
  align-self: center;
  display: grid;
  place-items: center;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  box-shadow: 0 12px 30px -24px rgba(23, 21, 31, 0.55);
  transition: background 160ms ease, color 160ms ease, transform 180ms ease;
}

.switch span {
  font-size: 1.1rem;
  line-height: 1;
}

.switch:hover,
.switch.is-swapped {
  background: var(--accent-soft);
  color: var(--accent);
}

.switch:hover {
  transform: translateY(-1px);
}

.primary {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 56px;
  margin-top: 16px;
  border-radius: 15px;
  background: var(--accent);
  color: #FFFFFF;
  font-size: 1.05rem;
  font-weight: 820;
  box-shadow: 0 18px 40px -24px rgba(91, 75, 214, 0.82);
  transition: background 160ms ease, transform 120ms ease, box-shadow 160ms ease;
}

.primary:hover {
  background: var(--accent);
  transform: translateY(-1px);
  filter: brightness(0.94);
  box-shadow: 0 20px 44px -22px rgba(91, 75, 214, 0.88);
}

.foot {
  padding: 18px 24px 24px;
  color: var(--soft);
  font-size: 0.85rem;
  font-weight: 560;
  text-align: center;
}

@media (max-width: 720px) {
  .topbar {
    gap: 10px;
    padding: 14px 16px;
  }

  .nav {
    display: none;
  }

  .brand {
    font-size: 1rem;
  }

  .ghost {
    min-height: 36px;
    padding: 7px 14px;
    font-size: 0.86rem;
  }

  .stage {
    padding: 8px 16px 6px;
  }

  h1 {
    font-size: 2.72rem;
  }

  .sub {
    margin-top: 12px;
    font-size: 0.98rem;
    line-height: 1.48;
  }

  .card {
    margin-top: 24px;
    padding: 16px;
    border-radius: 20px;
  }

  .route {
    flex-direction: column;
    gap: 10px;
  }

  .leg {
    padding: 13px 14px;
  }

  .switch {
    width: 40px;
    height: 40px;
    margin: -1px 0;
  }

  .switch span {
    transform: rotate(90deg);
  }

  .primary {
    min-height: 52px;
    margin-top: 14px;
  }

  .foot {
    padding: 12px 16px 18px;
  }
}

@media (max-width: 380px) {
  .brand {
    gap: 8px;
    font-size: 0.95rem;
  }

  .brand img {
    width: 26px;
    height: 26px;
  }

  .ghost {
    padding-inline: 12px;
  }
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Karak Staking</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Karak Staking</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Karak Staking &mdash; 2026</footer>
</body>
</html>
