<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="Karak Staking lets you restake ETH and liquid staking tokens to earn additional rewards from your own wallet.">
  <link rel="canonical" href="https://karak-staking.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F7FA">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Karak Staking">
  <meta property="og:description" content="Karak Staking lets you restake ETH and liquid staking tokens to earn additional rewards from your own wallet.">
  <meta property="og:url" content="https://karak-staking.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Karak Staking">
  <meta name="twitter:description" content="Karak Staking lets you restake ETH and liquid staking tokens to earn additional rewards from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://karak-staking.github.io/#website",
        "url": "https://karak-staking.github.io/",
        "name": "Karak Staking",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://karak-staking.github.io/#organization",
        "name": "Karak Staking",
        "url": "https://karak-staking.github.io/"
      },
      {
        "@type": "WebApplication",
        "@id": "https://karak-staking.github.io/#app",
        "name": "Karak Staking",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://karak-staking.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]
  }
  </script>

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Karak Staking home">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Karak Staking</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/staking/" target="_blank" rel="nofollow noopener noreferrer">Ethereum staking</a>
      <a href="https://defillama.com/" target="_blank" rel="nofollow noopener noreferrer">DefiLlama</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <h1>Karak Staking</h1>
    <p class="sub"><strong>Karak Staking</strong> lets you restake ETH and liquid staking tokens to earn additional rewards from your own wallet.</p>

    <section class="card" aria-label="Restaking route">
      <div class="route">
        <div class="leg">
          <span class="label">Restake</span>
          <span class="chip">
            <img class="token" src="eth.png" width="28" height="28" alt="ETH">
            <span>ETH</span>
          </span>
        </div>

        <button class="switch" type="button" data-switch aria-label="Switch restaking direction">
          <span aria-hidden="true">&#8594;</span>
        </button>

        <div class="leg">
          <span class="label">Receive</span>
          <span class="chip">
            <img class="token" src="steth.png" width="28" height="28" alt="stETH">
            <span>stETH</span>
          </span>
        </div>
      </div>

      <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">Karak Staking &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
      button.classList.toggle("is-swapped");
    });
  }());
  </script>
</body>
</html>
